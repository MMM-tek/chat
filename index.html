<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="page-title">Classroom</title>
    <link rel="icon" type="image/png" href="https://mmm-tek.github.io/classroom.png">
    <style>
        :root { --primary: #1a73e8; --bg: #ffffff; --text: #3c4043; --border: #dadce0; --gray: #f8f9fa; --red: #d93025; --green: #1e8e3e; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 30px; border-bottom: 1px solid var(--border); background: white; }
        header .brand { font-size: 24px; color: #5f6368; font-weight: bold; }
        .code-area { display: flex; align-items: center; gap: 10px; background: #3c4043; padding: 8px 15px; border-radius: 8px; color: white; }
        .blur-code { filter: blur(5px); transition: 0.3s; cursor: help; font-family: monospace; font-size: 1.2rem; }
        .code-area:hover .blur-code { filter: blur(0); }
        .copy-btn { background: var(--primary); border: none; color: white; cursor: pointer; border-radius: 4px; padding: 5px 10px; font-size: 11px; font-weight: bold; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; border-right: 1px solid var(--border); background: white; display: flex; flex-direction: column; }
        .sidebar-h { padding: 25px; font-weight: bold; border-bottom: 1px solid var(--border); color: var(--primary); font-size: 1.2rem; }
        .user-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 25px; border-bottom: 1px solid #eee; font-size: 16px; }
        .ctrls button { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; color: white; font-size: 11px; font-weight: bold; }
        #chat-area { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 25px; }
        .msg-container { position: relative; margin-bottom: 15px; }
        .msg-u { font-weight: bold; color: var(--primary); font-size: 15px; margin-bottom: 8px; display: block; }
        .msg-t { background: #e8f0fe; padding: 15px 25px; border-radius: 20px; display: inline-block; font-size: 18px; line-height: 1.6; max-width: 85%; position: relative; }
        .del-btn { display: none; position: absolute; right: -40px; top: 10px; cursor: pointer; background: none; border: none; color: var(--red); font-size: 20px; }
        .msg-t:hover .del-btn { display: block; }
        
        .f-card { margin-top: 15px; border: 1px solid var(--border); border-radius: 15px; overflow: hidden; background: white; width: 100%; max-width: 500px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .f-img { width: 100%; max-height: 450px; object-fit: contain; background: #f1f3f4; display: block; }
        .f-info { padding: 18px; display: flex; align-items: center; justify-content: space-between; gap: 15px; border-top: 1px solid var(--border); background: #fafafa; }
        .f-dl { background: var(--primary); color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: bold; white-space: nowrap; }
        .f-locked { color: #d93025; font-size: 13px; font-weight: bold; font-style: italic; }

        .input-p { padding: 30px 50px; border-top: 1px solid var(--border); position: relative; background: white; }
        .file-preview { display: none; background: #eef3ff; padding: 15px 25px; border-radius: 12px; margin-bottom: 15px; align-items: center; gap: 20px; border: 1px solid var(--primary); }
        .input-w { display: flex; gap: 20px; background: var(--gray); padding: 15px 30px; border-radius: 35px; border: 1px solid var(--border); align-items: center; }
        .input-w input { flex: 1; border: none; background: transparent; outline: none; font-size: 18px; }
        .overlay { position: fixed; inset: 0; background: white; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .card { width: 400px; text-align: center; border: 1px solid var(--border); padding: 50px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .hidden { display: none !important; }
        button.p-btn { background: var(--primary); color: white; border: none; padding: 18px 30px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 18px; width: 100%; }
        .sys-m { text-align: center; color: #70757a; font-size: 15px; margin: 10px 0; font-style: italic; }
        .setup-input { width: 100%; padding: 18px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; font-size: 18px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="setup-screen" class="overlay">
        <div class="card">
            <h1 style="font-weight: 400; color: #5f6368; margin-bottom: 40px; font-size: 2.5rem;">MMM-Chat</h1>
            <div id="step-1">
                <input type="text" id="username" class="setup-input" placeholder="Your name...">
                <button class="p-btn" id="btn-host-view">Host Room</button>
                <button id="btn-join-view" style="background:none; border:none; color:var(--primary); cursor:pointer; margin-top:25px; font-weight:bold; font-size: 16px;">Join a Room</button>
            </div>
            <div id="step-host-config" class="hidden">
                <p style="margin-bottom: 20px; color: #70757a;">Room Configuration:</p>
                <input type="text" id="chat-name-input" class="setup-input" placeholder="Chat Name (e.g. Math Class)">
                <button class="p-btn" id="btn-go-to-mode">Next</button>
            </div>
            <div id="step-join" class="hidden">
                <input type="text" id="target-id" placeholder="6-digit code" maxlength="6" class="setup-input">
                <button class="p-btn" id="btn-connect" style="margin-top:25px;">Enter</button>
            </div>
            <div id="step-mode" class="hidden">
                <button class="p-btn" id="mode-chat" style="margin-bottom: 15px;">💬 Chat Mode</button>
                <button class="p-btn" id="mode-voice" style="background: var(--green);">🎤 Voice Mode</button>
            </div>
        </div>
    </div>

    <header>
        <div class="brand" id="chat-brand-name">MMM-Chat</div>
        <div id="host-badge" class="hidden">
            <div class="code-area">
                <span class="blur-code" id="room-id-txt">000000</span>
                <button class="copy-btn" id="btn-copy">COPY</button>
            </div>
        </div>
    </header>

    <div class="main">
        <div class="sidebar">
            <div class="sidebar-h">People</div>
            <div id="user-list"></div>
        </div>
        <div class="chat-container" style="flex:1; display:flex; flex-direction:column;">
            <div id="chat-area"></div>
            <div class="input-p">
                <div id="file-preview-area" class="file-preview">
                    <span id="file-name-display" style="font-weight: bold; color: var(--primary);">File selected</span>
                    <label style="font-size: 13px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" id="allow-download-check" checked> Allow Others Download
                    </label>
                    <button onclick="clearFile()" style="background:none; border:none; color:var(--red); cursor:pointer; font-weight:bold; font-size: 18px;">✕</button>
                </div>
                <div class="input-w">
                    <input type="text" id="msg-input" placeholder="Type a message...">
                    <button id="btn-send" style="background:none; border:none; color:var(--primary); font-weight:bold; cursor:pointer; font-size: 18px;">SEND</button>
                </div>
                <label id="file-label" style="font-size: 15px; color: var(--primary); cursor: pointer; margin-top: 15px; display: inline-block; font-weight: 500;">
                    📎 Attach file
                    <input type="file" id="file-input" class="hidden">
                </label>
            </div>
        </div>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script src="peerjs.min.js"></script>
    <script>
        let peer, conns = {}, myName, isHost = false, mode = "", myStream = null, isMuted = false, chatTitle = "MMM-Chat", pendingFile = null;
        const chat = document.getElementById('chat-area');
        const list = document.getElementById('user-list');

        function updateChatTitle(newTitle) {
            if(!newTitle) return;
            chatTitle = newTitle;
            document.getElementById('chat-brand-name').innerText = chatTitle;
            document.getElementById('page-title').innerText = chatTitle + " | Classroom";
        }

        function addMsg(u, t, f = null, msgId = null) {
            const div = document.createElement('div');
            div.className = "msg-container";
            if(msgId) div.id = "msg-" + msgId;
            let fileHtml = '';
            if(f) {
                const blob = new Blob([f.blob], { type: f.type });
                const url = URL.createObjectURL(blob);
                const isImg = f.type && f.type.startsWith('image/');
                
                // Privilege: Host and Sender can always download. Others depends on 'allowDownload'
                const canDownload = isHost || u === "You" || f.allowDownload;
                const downloadBtn = canDownload ? `<a href="${url}" download="${f.name}" class="f-dl">Download</a>` : `<span class="f-locked">🔒 Locked by sender</span>`;
                
                fileHtml = `<div class="f-card">
                    ${isImg ? `<img src="${url}" class="f-img">` : `<div style="padding:60px;text-align:center;font-size:70px;background:#eee;">📄</div>`}
                    <div class="f-info">
                        <span style="font-size:14px;font-weight:bold;word-break:break-all;">${f.name}</span>
                        ${downloadBtn}
                    </div>
                </div>`;
            }
            const canDelete = isHost || u === "You";
            const delBtn = canDelete ? `<button class="del-btn" onclick="deleteMsg('${msgId}')">🗑️</button>` : '';
            div.innerHTML = `<span class="msg-u">${u}</span><div class="msg-t">${t}${delBtn}</div>${fileHtml}`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function deleteMsg(id) {
            const el = document.getElementById('msg-' + id);
            if(el) el.remove();
            const d = { type: 'delete', id: id };
            if(isHost) broadcast(d);
            else if(Object.keys(conns).length) Object.values(conns)[0].conn.send(d);
        }

        function sys(m) {
            const div = document.createElement('div');
            div.className = "sys-m";
            div.innerText = m;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function updateUsers() {
            list.innerHTML = `<div class="user-item"><span><b>${myName} (You)</b></span></div>`;
            Object.keys(conns).forEach(id => {
                const p = conns[id];
                const div = document.createElement('div');
                div.className = "user-item";
                div.innerHTML = `<span>${p.name}</span>` + (isHost ? `<div class="ctrls"><button onclick="muteUser('${id}', false)" style="background:var(--red); margin-right:5px;">Mute</button><button onclick="muteUser('${id}', true)" style="background:var(--green)">Unmute</button></div>` : '');
                list.appendChild(div);
            });
        }

        document.getElementById('btn-host-view').onclick = () => { myName = document.getElementById('username').value; if(!myName) return alert("Enter name"); show('step-host-config'); };
        document.getElementById('btn-go-to-mode').onclick = () => { const customTitle = document.getElementById('chat-name-input').value; if(customTitle) updateChatTitle(customTitle); show('step-mode'); };
        document.getElementById('btn-join-view').onclick = () => { myName = document.getElementById('username').value; if(!myName) return alert("Enter name"); show('step-join'); };
        document.getElementById('mode-chat').onclick = () => start(true, 'chat');
        document.getElementById('mode-voice').onclick = () => start(true, 'voice');
        document.getElementById('btn-connect').onclick = () => { start(false, null, document.getElementById('target-id').value); };

        function show(id) { document.querySelectorAll('.overlay .card > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }

        function start(host, m, tid = null) {
            isHost = host; mode = m;
            const rid = isHost ? Math.floor(100000 + Math.random() * 900000).toString() : null;
            peer = new Peer(rid);
            peer.on('open', id => {
                document.getElementById('setup-screen').classList.add('hidden');
                if(isHost) { document.getElementById('host-badge').classList.remove('hidden'); document.getElementById('room-id-txt').innerText = id; }
                else handle(peer.connect(tid));
            });
            peer.on('connection', handle);
            peer.on('call', call => { navigator.mediaDevices.getUserMedia({audio: true}).then(s => { myStream = s; call.answer(s); call.on('stream', rs => document.getElementById('remote-audio').srcObject = rs); }); });
        }

        function handle(c) {
            c.on('open', () => { conns[c.peer] = { conn: c, name: "Connecting..." }; c.send({ type: 'hi', name: myName, mode: mode, chatName: chatTitle }); });
            c.on('data', d => {
                if(d.type === 'hi') { conns[c.peer].name = d.name; if(isHost) { c.send({ type: 'sync', mode: mode, chatName: chatTitle }); sys(`${d.name} joined.`); broadcast({ type: 'msg', user: 'System', text: d.name + " joined." }); } else if(d.mode === 'voice') startVoice(c.peer); updateUsers(); }
                else if(d.type === 'sync') { mode = d.mode; updateChatTitle(d.chatName); if(mode === 'voice') startVoice(c.peer); }
                else if(d.type === 'msg') { addMsg(d.user, d.text, d.file, d.id); if(isHost) broadcast(d, c.peer); }
                else if(d.type === 'delete') { const el = document.getElementById('msg-' + d.id); if(el) el.remove(); if(isHost) broadcast(d, c.peer); }
                else if(d.type === 'mute-order') applyMute(d.status);
            });
            c.on('close', () => { delete conns[c.peer]; updateUsers(); });
        }

        function broadcast(d, skip = null) { Object.keys(conns).forEach(id => { if(id !== skip) conns[id].conn.send(d); }); }

        function applyMute(status) { isMuted = !status; document.getElementById('msg-input').disabled = isMuted; document.getElementById('msg-input').placeholder = isMuted ? "Muted by Host..." : "Type..."; document.getElementById('file-label').style.display = isMuted ? "none" : "inline-block"; }

        window.muteUser = function(id, status) { if(conns[id]) conns[id].conn.send({ type: 'mute-order', status: status }); };

        const sendMsg = () => {
            if(isMuted) return;
            const t = document.getElementById('msg-input').value;
            if(!t.trim() && !pendingFile) return;
            if(pendingFile) pendingFile.allowDownload = document.getElementById('allow-download-check').checked;
            const msgId = Date.now() + Math.random().toString(16).slice(2);
            addMsg("You", t, pendingFile, msgId);
            const d = { type: 'msg', user: myName, text: t, file: pendingFile, id: msgId };
            if(isHost) broadcast(d);
            else if(Object.keys(conns).length) Object.values(conns)[0].conn.send(d);
            document.getElementById('msg-input').value = ""; clearFile();
        };

        document.getElementById('btn-send').onclick = sendMsg;
        document.getElementById('msg-input').onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }};

        document.getElementById('file-input').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = () => { pendingFile = { name: f.name, type: f.type, blob: r.result }; document.getElementById('file-preview-area').style.display = 'flex'; document.getElementById('file-name-display').innerText = "📎 Ready: " + f.name; };
            r.readAsArrayBuffer(f);
        };

        function clearFile() { pendingFile = null; document.getElementById('file-preview-area').style.display = 'none'; document.getElementById('file-input').value = ""; }
        document.getElementById('btn-copy').onclick = () => { navigator.clipboard.writeText(document.getElementById('room-id-txt').innerText); sys("Code copied!"); };
    </script>
</body>
</html>
