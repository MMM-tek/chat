<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom</title>
    <link rel="icon" type="image/png" href="https://mmm-tek.github.io/classroom.png">
    <script src="peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0e11; --card: #15191c; --accent: #007bff; --danger: #f44336; --success: #4caf50; --border: #2d3339; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: #e1e1e1; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .hidden { display: none !important; }
        
        .overlay { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .card { background: var(--card); padding: 2.5rem; border-radius: 16px; text-align: center; width: 340px; border: 1px solid var(--border); }
        input { background: #1c2126; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; width: 90%; margin-bottom: 1rem; outline: none; }
        button { cursor: pointer; border: none; border-radius: 8px; padding: 10px 15px; font-weight: 600; transition: 0.2s; width: 100%; margin-bottom: 0.5rem; }
        .btn-primary { background: var(--accent); color: white; }

        header { padding: 0.8rem 1.5rem; background: var(--card); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        #main-container { flex: 1; display: flex; overflow: hidden; }

        #sidebar { width: 240px; background: var(--card); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 15px; }
        .user-row { padding: 10px; border-bottom: 1px solid #222; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }

        #chat-area { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 10px; }
        .msg { background: #1c2126; padding: 10px 15px; border-radius: 12px; max-width: 80%; border: 1px solid var(--border); }

        #controls { padding: 1rem; background: var(--card); display: flex; gap: 12px; align-items: center; border-top: 1px solid var(--border); }
        .btn-round { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #2d3339; color: white; flex-shrink: 0; font-size: 1.2rem; }
        
        #file-preview { padding: 10px 20px; background: #1c2126; border-top: 1px solid var(--border); font-size: 0.8rem; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div id="setup-screen" class="overlay">
        <div class="card">
            <h1>MMM-TEK</h1>
            <div id="step-user">
                <input type="text" id="username" placeholder="Your Name">
                <button class="btn-primary" id="btn-host-view">Create Room</button>
                <button class="btn-primary" style="background:#2d3339;" id="btn-join-view">Join Room</button>
            </div>
            <div id="step-host-config" class="hidden">
                <button class="btn-primary" id="mode-chat">Chat & Files</button>
                <button class="btn-primary" id="mode-voice">Voice Room</button>
            </div>
            <div id="step-join" class="hidden">
                <input type="text" id="target-id" placeholder="Paste Room ID">
                <button class="btn-primary" id="btn-connect">Connect Now</button>
                <div id="join-error" class="status-msg hidden" style="color:var(--danger); margin-bottom:10px;">Error connecting...</div>
            </div>
        </div>
    </div>

    <header>
        <span style="font-weight: 800; color: var(--accent);">MMM-TEK</span>
        <div id="active-info" class="hidden">
            ID: <b id="room-id-txt"></b>
            <button onclick="resetApp()" style="background:var(--danger); color:white; width:auto; padding:3px 10px; margin-left:10px;">EXIT</button>
        </div>
    </header>

    <div id="main-container">
        <aside id="sidebar">
            <div style="font-size: 0.7rem; opacity: 0.5; margin-bottom: 12px;">ONLINE USERS</div>
            <div id="user-list"></div>
        </aside>

        <main style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <div id="voice-ui" class="hidden" style="flex:1; display:flex; align-items:center; justify-content:center;">
                <div style="text-align:center; background:var(--card); padding:2rem; border-radius:20px;">
                    <div style="font-size:3rem;">🎙️</div>
                    <button id="btn-self-mute" class="btn-primary" onclick="toggleSelfMute()">Mic: ON</button>
                </div>
            </div>

            <div id="chat-section" style="display: flex; flex-direction: column; flex: 1;">
                <div id="chat-area"></div>
                <div id="file-preview" class="hidden">
                    <span id="file-name-info"></span>
                    <button onclick="clearFile()" style="width:auto; background:none; color:var(--danger); padding:0;">[Cancel]</button>
                </div>
                <div id="controls">
                    <input type="file" id="file-input" class="hidden">
                    <button onclick="document.getElementById('file-input').click()" class="btn-round">📎</button>
                    <input type="text" id="msg-input" placeholder="Message...">
                    <button id="btn-send" class="btn-primary" style="width:auto; padding:0 20px;">SEND</button>
                </div>
            </div>
        </main>
    </div>

    <audio id="remote-audio" autoplay></audio>

    <script>
        let peer = null, myStream = null, myName = "", isHost = false, mode = "", pendingFile = null;
        let conns = {};

        function resetApp() {
            Object.values(conns).forEach(c => c.conn.close());
            if(peer) peer.destroy();
            location.reload(); // Recarga limpia para asegurar nueva sesión
        }

        function start(host, m, tid = null) {
            isHost = host; mode = m;
            myName = document.getElementById('username').value.trim() || "User";
            peer = new Peer(isHost ? Math.floor(100000 + Math.random() * 900000).toString() : null);

            peer.on('open', id => {
                if(isHost) {
                    document.getElementById('setup-screen').classList.add('hidden');
                    document.getElementById('active-info').classList.remove('hidden');
                    document.getElementById('room-id-txt').innerText = id;
                    if(mode === 'voice') startVoice();
                    updateUsers();
                } else {
                    const conn = peer.connect(tid, { metadata: { name: myName } });
                    handle(conn);
                }
            });

            peer.on('connection', handle);
            peer.on('call', async call => {
                const s = await navigator.mediaDevices.getUserMedia({audio:true});
                call.answer(s);
                call.on('stream', rs => document.getElementById('remote-audio').srcObject = rs);
            });
        }

        function handle(c) {
            const onOpen = () => {
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('active-info').classList.remove('hidden');
                conns[c.peer] = { conn: c, name: c.metadata ? c.metadata.name : "Guest" };
                if(isHost) c.send({ type: 'sync', mode: mode });
                updateUsers();
            };

            if (c.open) onOpen(); else c.on('open', onOpen);

            c.on('data', d => {
                if(d.type === 'sync') { 
                    mode = d.mode; 
                    if(mode === 'voice') startVoice(c.peer); 
                    document.getElementById('chat-section').classList.toggle('hidden', mode === 'voice');
                    document.getElementById('voice-ui').classList.toggle('hidden', mode !== 'voice');
                }
                else if(d.type === 'msg') { addMsg(d.user, d.text, d.file); if(isHost) broadcast(d, c.peer); }
            });

            c.on('close', () => { delete conns[c.peer]; updateUsers(); });
        }

        async function startVoice(tid = null) {
            myStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            document.getElementById('chat-section').classList.add('hidden');
            document.getElementById('voice-ui').classList.remove('hidden');
            if (!isHost && tid) {
                const call = peer.call(tid, myStream);
                call.on('stream', rs => document.getElementById('remote-audio').srcObject = rs);
            }
        }

        const send = () => {
            const input = document.getElementById('msg-input');
            if(!input.value.trim() && !pendingFile) return;
            const d = { type: 'msg', user: myName, text: input.value, file: pendingFile };
            addMsg("You", input.value, pendingFile);
            if(isHost) broadcast(d); else Object.values(conns).forEach(c => c.conn.send(d));
            input.value = ""; clearFile();
        };

        function addMsg(user, text, file) {
            const div = document.createElement('div');
            div.className = "msg";
            div.innerHTML = `<b>${user}:</b> ${text}`;
            if(file) {
                const blob = new Blob([file.blob], {type: file.type});
                const url = URL.createObjectURL(blob);
                div.innerHTML += `<br><a href="${url}" download="${file.name}" style="color:var(--success); font-weight:bold;">📂 Download: ${file.name}</a>`;
            }
            document.getElementById('chat-area').appendChild(div);
            document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
        }

        function updateUsers() {
            const list = document.getElementById('user-list');
            list.innerHTML = `<div class="user-row"><b>${myName} (You)</b></div>`;
            Object.values(conns).forEach(u => {
                list.innerHTML += `<div class="user-row">${u.name}</div>`;
            });
        }

        function broadcast(d, skip = null) {
            Object.keys(conns).forEach(id => { if(id !== skip) conns[id].conn.send(d); });
        }

        document.getElementById('file-input').onchange = (e) => {
            const f = e.target.files[0]; if(!f) return;
            const r = new FileReader();
            r.onload = () => {
                pendingFile = { name: f.name, type: f.type, blob: r.result };
                document.getElementById('file-preview').classList.remove('hidden');
                document.getElementById('file-name-info').innerText = "Ready: " + f.name;
            };
            r.readAsArrayBuffer(f);
        };

        function clearFile() { pendingFile = null; document.getElementById('file-preview').classList.add('hidden'); }
        document.getElementById('btn-send').onclick = send;
        document.getElementById('btn-host-view').onclick = () => show('step-host-config');
        document.getElementById('btn-join-view').onclick = () => show('step-join');
        document.getElementById('mode-chat').onclick = () => start(true, 'chat');
        document.getElementById('mode-voice').onclick = () => start(true, 'voice');
        document.getElementById('btn-connect').onclick = () => start(false, null, document.getElementById('target-id').value);
        function show(id) { document.querySelectorAll('.card > div').forEach(d => d.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
    </script>
</body>
</html>
